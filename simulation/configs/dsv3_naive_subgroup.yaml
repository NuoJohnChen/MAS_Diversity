prompts:
  prompt: &prompt |-
    You are participating in a 5-round academic discussion on '{topic}'.Because it is a multi-person discussion, the knowledge covered is also more comprehensive.

    # Discussion Phases
    - Rounds 1-4: Multi-agent academic discussion with literature support
    - Round 5: Participant 1-powered grounded idea proposal

    # Important: Speak naturally without structured annotations or meta-comments about tools. Have a normal academic conversation. Do not include any thoughts like '(I'll now activate...)' in your output.
    DO NOT APPEAR LIKE THIS: Action: semantic_scholar_search Action Input: ["Chen et al. 2023 Dynamic Sparsity for Efficient Deep Metric Learning", "hierarchical sparsity in metric learning", "Lipschitz properties of sparse attention metrics"]

    # Output Format
    
    Your response should be a natural academic contribution, written as if speaking in a discussion. Do not use any structured tags like 'Action:' or 'Action Input:'. Just provide your thoughtful input directly.
    Don't include any references or additional output at the end of the response, just clean and direct speech.

    Here are the conversation history:
    ${chat_history}

    Here are the observations from tool execution:
    ${tool_observation}

    You can see the conversation history. Base your response strictly on this.

name: Randomized Subgroup Collaboration – Anti-Groupthink

environment:
  env_type: sim-basic
  max_turns: 5
  round0_concurrent: false
  incremental_memory_each_message: true
  rule:
    order:
      type: subgroup_random
      group_sizes: [1, 2, 3, 2]
      rounds_per_size: 1
      leader_idx: -1
      final_leader: true
      include_leader_in_subgroups: false
    visibility:
      type: subgroup
    selector:
      type: ngt
    updater:
      type: subgroup
    describer:
      type: subgroup

agents:
  - agent_type: conversation
    name: Participant 1
    role_description: A senior AI researcher with expertise in {topic_lower}, conducting thoughtful self-reflection and literature review.
    prompt_template: *prompt
    memory:
      memory_type: chat_history
    memory_manipulator:
      memory_manipulator_type: basic
    llm:
      llm_type: deepseek
      model: 'deepseek-v3'
      temperature: 0.7
      max_tokens: 6000
    output_parser:
      type: dummy
    tools: []

  - agent_type: conversation
    name: Participant 2
    role_description: A senior AI researcher with expertise in {topic_lower}, conducting thoughtful self-reflection and literature review.
    prompt_template: *prompt
    memory:
      memory_type: chat_history
    memory_manipulator:
      memory_manipulator_type: basic
    llm:
      llm_type: deepseek
      model: 'deepseek-v3'
      temperature: 0.7
      max_tokens: 6000
    output_parser:
      type: dummy
    tools: []

  - agent_type: conversation
    name: Participant 3
    role_description: A senior AI researcher with expertise in {topic_lower}, conducting thoughtful self-reflection and literature review.
    prompt_template: *prompt
    memory:
      memory_type: chat_history
    memory_manipulator:
      memory_manipulator_type: basic
    llm:
      llm_type: deepseek
      model: 'deepseek-v3'
      temperature: 0.7
      max_tokens: 6000
    output_parser:
      type: dummy
    tools: []

  - agent_type: tool
    name: Participant 1
    role_description: The same senior AI researcher with expertise in {topic_lower} who participated in the discussion, now synthesizing the team's collaborative insights into a comprehensive research proposal.
    memory:
      memory_type: chat_history
    memory_manipulator:
      memory_manipulator_type: basic
    prompt_template: |-
      You are the same Participant 1 who has been participating in the 4-round multi-agent academic discussion, now generating a research proposal based STRICTLY on the multi-agent discussion above. As the same person who contributed to these discussions, you possess all the knowledge, insights, and collaborative exchanges from your previous participation. Remember your own contributions, as well as the insights from Participant 2 and Participant 3, as you synthesize this proposal.

      Synthesize the diverse perspectives, key insights, debates, and agreements from ALL participants. Explicitly reference and build upon at least 4 specific elements from the dialogue (e.g., "As I argued in the discussion...", "Building on Participant 2's point...", "Responding to Participant 3's concerns..."), attributing them ONLY to existing participants (Participant 1 [yourself], 2, 3). Do not invent or reference additional participants. This demonstrates how collaboration can produce more innovative ideas.
      
      Here is the conversation history:
      ${chat_history}

      You can see the conversation history. Base your response strictly on this.

      CRITICAL: EVERY section MUST include at least one direct paraphrase or quote from the discussion.
      
      Here is the exact format to follow:

      1. Title:
      
      2. Problem Statement:
      
      3. Motivation & Hypothesis:
      
      4. Proposed Method:
      
      5. Step-by-Step Experiment Plan:
      
      Now write you proposal in the EXACT same format
      
      CRITICAL REQUIREMENTS:
      1. Use the exact numbering format: 1. Title: 2. Problem Statement: 3. Motivation & Hypothesis: 4. Proposed Method: 5. Step-by-Step Experiment Plan:
      2. Include a References section at the end if you have cited any literature from the discussion; otherwise write 'References: None'.
      3. Do NOT include any tool calls, actions, or meta-comments in the output - the content must be pure proposal text.

      Remember: Your ENTIRE response must be:
      1. Title:
      [your research title]
      2. Problem Statement:
      [detailed problem statement about limitations]
      3. Motivation & Hypothesis:
      [detailed motivation and central hypothesis]
      4. Proposed Method:
      [detailed technical approach]
      5. Step-by-Step Experiment Plan:
      [exactly experimental steps]
      References:
      [relevant citations if available; or 'None']
    llm:
      llm_type: deepseek
      model: 'deepseek-v3'
      temperature: 0.4
      max_tokens: 8000
    output_parser:
      type: dummy
    tools: []

tools: []

# AI-Researcher Configuration (disabled)
ai_researcher_config: {}
